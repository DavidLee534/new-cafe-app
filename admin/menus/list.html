<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>메뉴 관리 - 카페 앱 관리자</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../css/variables.css">
  <link rel="stylesheet" href="list.css">
</head>
<body>
  <div class="admin-container">
    <!-- 사이드바 / 네비게이션 -->
    <aside class="admin-sidebar glass">
      <div class="sidebar-brand">
        <span class="brand-emoji">☕</span>
        <h1 class="brand-title">Cafe Admin</h1>
      </div>
      <nav class="sidebar-menu">
        <a href="../index.html" class="menu-item">
          <span class="menu-icon">📊</span> 대시보드
        </a>
        <a href="list.html" class="menu-item active">
          <span class="menu-icon">📋</span> 메뉴 관리
        </a>
        <a href="../orders/list.html" class="menu-item">
          <span class="menu-icon">🛍️</span> 주문 관리
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="../../index.html" class="btn btn-outline btn-sm">
          <span>🏠</span> 고객 홈 바로가기
        </a>
      </div>
    </aside>

    <!-- 메인 콘텐츠 영역 -->
    <main class="admin-main">
      <header class="main-header glass">
        <div class="header-info">
          <h2>메뉴 관리</h2>
          <p>등록된 전체 메뉴를 조회하고 관리합니다.</p>
        </div>
        <div class="header-actions">
          <a href="create.html" class="btn btn-primary">
            <span>✨</span> 새 메뉴 등록
          </a>
        </div>
      </header>

      <!-- 필터 및 검색 바 -->
      <section class="filter-section glass">
        <div class="category-filters" id="categoryFilters">
          <button class="filter-btn active" data-category="all">전체</button>
          <!-- JS로 카테고리 로드 및 활성화 처리 -->
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="메뉴 이름을 검색하세요...">
          <span class="search-icon">🔍</span>
        </div>
      </section>

      <!-- 메뉴 목록 그리드 -->
      <section class="menu-grid-section">
        <div class="menu-grid" id="menuGrid">
          <!-- JS로 동적 생성 -->
        </div>
        <div class="empty-state" id="emptyState" style="display: none;">
          <div class="empty-icon">☕</div>
          <h3>등록된 메뉴가 없습니다</h3>
          <p>새로운 메뉴를 등록해 보세요!</p>
          <a href="create.html" class="btn btn-primary btn-sm">메뉴 추가하기</a>
        </div>
      </section>
    </main>
  </div>

  <!-- 삭제 확인 커스텀 모달 -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3>🚨 메뉴 삭제</h3>
        <button class="modal-close" onclick="closeDeleteModal()">&times;</button>
      </div>
      <div class="modal-body">
        <p>정말로 '<span id="deleteTargetName"></span>' 메뉴를 삭제하시겠습니까?</p>
        <p class="modal-warn">삭제된 메뉴는 복구할 수 없습니다.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" onclick="closeDeleteModal()">취소</button>
        <button class="btn btn-danger btn-sm" id="confirmDeleteBtn">삭제</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../../js/data.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="list.js" defer></script>
</body>
</html>
